server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — go_router lida com as rotas no client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Nunca cachear HTML e o loader do Flutter (muda a cada build)
    location ~* \.(html|js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Assets com hash no nome podem ser cacheados com segurança
    location ~* \.(wasm|png|jpg|svg|ico|css|ttf|woff2)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}
